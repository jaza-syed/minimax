repos:
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bunx eslint --fix
        language: system
        files: \.(ts|tsx)$
        types: [file]

      - id: prettier
        name: prettier
        entry: bunx prettier --write --ignore-unknown
        language: system
        files: \.(ts|tsx)$
        types: [file]
